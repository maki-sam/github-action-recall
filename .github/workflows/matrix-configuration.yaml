name: Martix Configuration
on:
    push:
    workflow_dispatch:

jobs:
    deploy:
        strategy:
            fail-fast: false
            max-parallel: 2
            matrix:
                os: [ubuntu-latest, windows-latest]
                image: [hello-world:latest, alpine:latest]
                exclude:
                    - os: windows-latest
                      image: alpine:latest
                include:
                    - os: ubuntu-latest
                      image: busybox:latest
        runs-on: ${{ matrix.os }}
        steps:
            - name: Echo Docker Details
              run: docker info
            
            - name: Run Docker Hello Container
              run: docker run ${{ matrix.image }}